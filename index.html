<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHUEL LI YU</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#a9c3d6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

/* 화면 공통 */
.screen{
  display:none;
  flex-direction:column;
  align-items:center;
}
.active{ display:flex; }

/* 홈 */
.home h1{
  font-size:40px;
}
.home button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:white;
  color:#5d8aa8;
  cursor:pointer;
}

/* 선택 화면 */
.setup{
  text-align:center;
}

.color{
  width:50px;
  height:50px;
  display:inline-block;
  margin:10px;
  border-radius:8px;
  cursor:pointer;
}

.sheet{
  padding:10px;
  margin:10px;
  background:#ddd;
  display:inline-block;
  cursor:pointer;
  color:black;
}

/* 바인더 */
.binder{
  display:none;
  width:800px;
  height:450px;
  position:relative;
}

/* 표지 */
.cover{
  width:300px;
  height:450px;
  position:absolute;
  left:250px;
  transform-origin:left;
  transition:1s;
  z-index:3;
}

.cover.open{
  transform:rotateY(-160deg);
}

/* 왼쪽 */
.left{
  width:300px;
  height:450px;
}

/* 오른쪽 */
.right{
  width:300px;
  height:450px;
  background:white;
  border:6px solid #555;
  display:grid;
  gap:10px;
  padding:10px;
  position:absolute;
  left:500px;
  top:0;
}

/* 포카칸 */
.slot{
  background:#ddd;
}

/* 버튼 */
button{
  padding:10px 20px;
  margin:10px;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 1️⃣ 홈 -->
<div id="home" class="screen active home">
  <h1>CHUEL LI YU</h1>
  <p>PHOTO CARD BINDER</p>
  <button onclick="goTo('setup')">MY</button>
</div>

<!-- 2️⃣ 설정 -->
<div id="setup" class="screen setup">

<h3>색상 선택</h3>
<div class="color" style="background:black" onclick="colorSelect('black')"></div>
<div class="color" style="background:pink" onclick="colorSelect('pink')"></div>
<div class="color" style="background:skyblue" onclick="colorSelect('skyblue')"></div>

<h3>속지</h3>
<div class="sheet" onclick="sheetSelect(4)">4칸</div>
<div class="sheet" onclick="sheetSelect(9)">9칸</div>

<button onclick="start()">바인더 만들기</button>

</div>

<!-- 3️⃣ 바인더 -->
<div id="binder" class="screen binder">

<div class="cover" id="cover"></div>
<div class="left" id="left"></div>
<div class="right" id="right"></div>

<button onclick="next()">다음 ▶</button>
<button onclick="goTo('home')">홈</button>

</div>

<script>
let color="black";
let sheet=4;
let page=0;

function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function colorSelect(c){ color=c; }
function sheetSelect(s){ sheet=s; }

function start(){
  goTo('binder');

  document.getElementById("cover").style.background=color;
  document.getElementById("left").style.background=color;

  render();

  setTimeout(()=>{
    document.getElementById("cover").classList.add("open");
  },100);
}

function render(){
  const right=document.getElementById("right");

  if(page===3){
    right.style.background="black";
    right.innerHTML="";
    return;
  }

  right.style.background="white";
  right.innerHTML="";

  if(sheet===4){
    right.style.gridTemplateColumns="1fr 1fr";
  }else{
    right.style.gridTemplateColumns="1fr 1fr 1fr";
  }

  for(let i=0;i<sheet;i++){
    const d=document.createElement("div");
    d.className="slot";
    right.appendChild(d);
  }
}

function next(){
  if(page<3){
    page++;
    render();
  }
}
</script>

</body>
</html>
