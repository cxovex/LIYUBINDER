<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHUEL Binder</title>

<style>
body{
  margin:0;
  background:#e5e5e5;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* 전체 영역 */
.binder-wrapper{
  width:900px;
  height:500px;
  perspective:2000px;
  position:relative;
}

/* 표지 */
.cover{
  width:300px;
  height:500px;
  background:black;
  border-radius:10px;
  position:absolute;
  left:300px;
  transform-origin:left;
  transition:transform 1s ease;
  z-index:5;
}

.cover.open{
  transform:rotateY(-180deg);
}

/* 내부 영역 */
.book{
  display:flex;
  width:900px;
  height:500px;
}

/* 왼쪽 고정 검정 */
.left-spine{
  width:300px;
  height:500px;
  background:black;
}

/* 페이지 영역 */
.pages{
  display:flex;
  width:600px;
  height:500px;
  overflow:hidden;
}

/* 한 페이지 (좌 or 우) */
.page{
  width:300px;
  height:500px;
  background:white;
  border:8px solid #555;
  box-sizing:border-box;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:10px;
  padding:15px;
}

/* 포카칸 */
.card-slot{
  background:#ddd;
  border-radius:6px;
}

/* 버튼 */
.controls{
  position:absolute;
  bottom:-60px;
  width:100%;
  text-align:center;
}

button{
  padding:10px 20px;
  margin:0 10px;
  border:none;
  background:black;
  color:white;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="binder-wrapper">

  <div class="cover" id="cover"></div>

  <div class="book">
    <div class="left-spine"></div>

    <div class="pages" id="pages">
      <div class="page" id="leftPage"></div>
      <div class="page" id="rightPage"></div>
    </div>
  </div>

  <div class="controls">
    <button onclick="prevPage()">◀ 이전</button>
    <button onclick="nextPage()">다음 ▶</button>
  </div>

</div>

<script>
const cover = document.getElementById("cover");
const leftPage = document.getElementById("leftPage");
const rightPage = document.getElementById("rightPage");

let currentSpread = 0;

/* 총 3 스프레드 (너 그림 기준) */
const spreads = [
  "normal",
  "normal",
  "last"
];

/* 표지 열기 */
cover.addEventListener("click", ()=>{
  cover.classList.add("open");
  renderSpread();
});

function createPageContent(pageElement){
  pageElement.innerHTML = "";
  for(let i=0;i<4;i++){
    const slot = document.createElement("div");
    slot.className = "card-slot";
    pageElement.appendChild(slot);
  }
}

function renderSpread(){
  const type = spreads[currentSpread];

  if(type === "normal"){
    createPageContent(leftPage);
    createPageContent(rightPage);
  }

  if(type === "last"){
    createPageContent(leftPage);
    rightPage.innerHTML = "";
    rightPage.style.background = "black";
    rightPage.style.border = "none";
  } else {
    rightPage.style.background = "white";
    rightPage.style.border = "8px solid #555";
  }
}

function nextPage(){
  if(currentSpread < spreads.length - 1){
    currentSpread++;
    renderSpread();
  }
}

function prevPage(){
  if(currentSpread > 0){
    currentSpread--;
    renderSpread();
  }
}
</script>

</body>
</html>
