<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHUEL Binder</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#e5e5e5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

/* 선택 화면 */
.setup{
  text-align:center;
}

.color-option{
  width:60px;
  height:60px;
  display:inline-block;
  margin:10px;
  border-radius:8px;
  cursor:pointer;
  border:3px solid transparent;
}

.color-option.selected{
  border:3px solid #000;
}

.sheet-option{
  padding:10px 20px;
  margin:10px;
  background:#ddd;
  cursor:pointer;
  display:inline-block;
}

/* 바인더 영역 */
.binder-wrapper{
  width:900px;
  height:500px;
  perspective:2000px;
  position:relative;
  display:none;
}

.cover{
  width:300px;
  height:500px;
  border-radius:10px;
  position:absolute;
  left:300px;
  transform-origin:left;
  transition:transform 1s ease;
  z-index:5;
}

.cover.open{
  transform:rotateY(-180deg);
}

.book{
  display:flex;
  width:900px;
  height:500px;
}

.left-spine{
  width:300px;
  height:500px;
}

.pages{
  display:flex;
  width:600px;
  height:500px;
}

.page{
  width:300px;
  height:500px;
  border:8px solid #555;
  box-sizing:border-box;
  display:grid;
  gap:10px;
  padding:15px;
}

.card-slot{
  background:#ddd;
  border-radius:6px;
}

.controls{
  position:absolute;
  bottom:-60px;
  width:100%;
  text-align:center;
}

button{
  padding:10px 20px;
  margin:0 10px;
  border:none;
  background:black;
  color:white;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="setup" id="setup">

<h2>바인더 색 선택</h2>

<div>
  <div class="color-option" style="background:black" onclick="selectColor('black',this)"></div>
  <div class="color-option" style="background:pink" onclick="selectColor('pink',this)"></div>
  <div class="color-option" style="background:skyblue" onclick="selectColor('skyblue',this)"></div>
</div>

<h2>속지 선택</h2>

<div>
  <div class="sheet-option" onclick="selectSheet(4)">4칸</div>
  <div class="sheet-option" onclick="selectSheet(9)">9칸</div>
</div>

<br>
<button onclick="startBinder()">바인더 만들기</button>

</div>


<div class="binder-wrapper" id="binderWrapper">

  <div class="cover" id="cover"></div>

  <div class="book">
    <div class="left-spine" id="spine"></div>

    <div class="pages">
      <div class="page" id="leftPage"></div>
      <div class="page" id="rightPage"></div>
    </div>
  </div>

  <div class="controls">
    <button onclick="prevPage()">◀ 이전</button>
    <button onclick="nextPage()">다음 ▶</button>
  </div>

</div>

<script>
let selectedColor = "black";
let selectedSheet = 4;
let currentSpread = 0;

const spreads = ["normal","normal","last"];

const cover = document.getElementById("cover");
const spine = document.getElementById("spine");
const leftPage = document.getElementById("leftPage");
const rightPage = document.getElementById("rightPage");

function selectColor(color,el){
  selectedColor = color;
  document.querySelectorAll(".color-option").forEach(c=>c.classList.remove("selected"));
  el.classList.add("selected");
}

function selectSheet(type){
  selectedSheet = type;
}

function startBinder(){
  document.getElementById("setup").style.display="none";
  document.getElementById("binderWrapper").style.display="block";

  cover.style.background = selectedColor;
  spine.style.background = selectedColor;

  renderSpread();
}

cover.addEventListener("click",()=>{
  cover.classList.add("open");
});

function createPageContent(pageElement){
  pageElement.innerHTML="";
  
  if(selectedSheet === 4){
    pageElement.style.gridTemplateColumns="1fr 1fr";
    pageElement.style.gridTemplateRows="1fr 1fr";
  }else{
    pageElement.style.gridTemplateColumns="1fr 1fr 1fr";
    pageElement.style.gridTemplateRows="1fr 1fr 1fr";
  }

  for(let i=0;i<selectedSheet;i++){
    const slot=document.createElement("div");
    slot.className="card-slot";
    pageElement.appendChild(slot);
  }
}

function renderSpread(){
  const type = spreads[currentSpread];

  if(type==="normal"){
    createPageContent(leftPage);
    createPageContent(rightPage);
  }

  if(type==="last"){
    createPageContent(leftPage);
    rightPage.innerHTML="";
    rightPage.style.background="black";
    rightPage.style.border="none";
  }else{
    rightPage.style.background="white";
    rightPage.style.border="8px solid #555";
  }
}

function nextPage(){
  if(currentSpread < spreads.length-1){
    currentSpread++;
    renderSpread();
  }
}

function prevPage(){
  if(currentSpread > 0){
    currentSpread--;
    renderSpread();
  }
}
</script>

</body>
</html>
