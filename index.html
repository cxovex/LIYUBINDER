<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHUEL LI YU</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#a9c3d6;
  text-align:center;
  color:white;
}

/* 화면 */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{
  display:flex;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  margin:10px;
  cursor:pointer;
}

/* 바인더 */
.binder{
  width:120px;
  height:160px;
  border-radius:15px;
  margin:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.3s;
}

.binder:hover{
  transform:scale(1.05);
}

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

/* 속지 */
.page{
  width:250px;
  height:350px;
  background:white;
  border-radius:10px;
  margin-top:20px;
  display:grid;
  gap:5px;
  padding:10px;
}

.one{ grid-template-columns:1fr; }
.three{ grid-template-columns:1fr; grid-template-rows:repeat(3,1fr); }
.four{ grid-template-columns:repeat(2,1fr); grid-template-rows:repeat(2,1fr); }

.slot{
  background:#eaeaea;
  border-radius:5px;
}
</style>
</head>

<body>

<!-- 메인 -->
<div id="main" class="screen active">
  <h1>CRUEL LI YU</h1>
  <button onclick="goTo('binderScreen')">MY</button>
</div>

<!-- 바인더 목록 -->
<div id="binderScreen" class="screen">
  <h2>MY BINDER</h2>
  <div class="grid" id="binderList"></div>
  <button onclick="goTo('colorScreen')">＋</button>
</div>

<!-- 1️⃣ 색상 선택 -->
<div id="colorScreen" class="screen">
  <h2>바인더 색상 선택</h2>
  <input type="color" id="colorPicker">
  <button onclick="goTo('layoutScreen')">다음</button>
  <button onclick="goTo('binderScreen')">← 뒤로</button>
</div>

<!-- 2️⃣ 속지 선택 -->
<div id="layoutScreen" class="screen">
  <h2>속지 선택</h2>
  <button onclick="createBinder('one')">1칸</button>
  <button onclick="createBinder('three')">3칸</button>
  <button onclick="createBinder('four')">4칸</button>
</div>

<!-- 3️⃣ 바인더 내부 보기 -->
<div id="pageScreen" class="screen">
  <h2>속지</h2>
  <div id="pagePreview"></div>
  <button onclick="goTo('binderScreen')">홈으로</button>
</div>

<script>
let binders = [];
let selectedColor = "#ffffff";

function goTo(screenId){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');

  if(screenId === 'layoutScreen'){
    selectedColor = document.getElementById('colorPicker').value;
  }
}

function createBinder(layoutType){
  const binder = {
    id: Date.now(),
    color: selectedColor,
    layout: layoutType
  };
  binders.push(binder);
  renderBinders();
  goTo('binderScreen');
}

function renderBinders(){
  const list = document.getElementById('binderList');
  list.innerHTML = '';

  binders.forEach(b => {
    const div = document.createElement('div');
    div.className = 'binder';
    div.style.background = b.color;
    div.onclick = () => openBinder(b);
    list.appendChild(div);
  });
}

function openBinder(binder){
  const page = document.createElement('div');
  page.className = 'page ' + binder.layout;

  let slots = 1;
  if(binder.layout === 'three') slots = 3;
  if(binder.layout === 'four') slots = 4;

  for(let i=0;i<slots;i++){
    const div = document.createElement('div');
    div.className = 'slot';
    page.appendChild(div);
  }

  const preview = document.getElementById('pagePreview');
  preview.innerHTML = '';
  preview.appendChild(page);

  goTo('pageScreen');
}
</script>

</body>
</html>
