<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHUEL LI YU</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#a9c3d6;
  text-align:center;
  color:white;
  overflow:hidden;
}

/* 화면 */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{
  display:flex;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  margin:10px;
  cursor:pointer;
}

/* 바인더 카드 */
.binder{
  width:120px;
  height:160px;
  border-radius:15px;
  margin:15px;
  cursor:pointer;
  transition:0.3s;
}

.binder:hover{
  transform:scale(1.05);
}

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

/* ===== 열리는 애니메이션 ===== */

.opening-container{
  perspective:1000px;
}

.book{
  width:250px;
  height:350px;
  position:relative;
}

.cover{
  width:100%;
  height:100%;
  border-radius:10px;
  position:absolute;
  left:0;
  top:0;
  transform-origin:left;
  transition:transform 1s ease;
  z-index:2;
}

.book.open .cover{
  transform:rotateY(-120deg);
}

/* 속지 */
.page{
  width:100%;
  height:100%;
  background:white;
  border-radius:10px;
  position:absolute;
  top:0;
  left:0;
  display:grid;
  gap:5px;
  padding:10px;
  z-index:1;
}

.one{ grid-template-columns:1fr; }
.three{ grid-template-columns:1fr; grid-template-rows:repeat(3,1fr); }
.four{ grid-template-columns:repeat(2,1fr); grid-template-rows:repeat(2,1fr); }

.slot{
  background:#eaeaea;
  border-radius:5px;
}
</style>
</head>

<body>

<!-- 메인 -->
<div id="main" class="screen active">
  <h1>CHUEL LI YU</h1>
  <button onclick="goTo('binderScreen')">MY</button>
</div>

<!-- 바인더 목록 -->
<div id="binderScreen" class="screen">
  <h2>MY BINDER</h2>
  <div class="grid" id="binderList"></div>
  <button onclick="goTo('colorScreen')">＋</button>
</div>

<!-- 색상 선택 -->
<div id="colorScreen" class="screen">
  <h2>바인더 색상 선택</h2>
  <input type="color" id="colorPicker">
  <button onclick="goToLayout()">다음</button>
  <button onclick="goTo('binderScreen')">← 뒤로</button>
</div>

<!-- 속지 선택 -->
<div id="layoutScreen" class="screen">
  <h2>속지 선택</h2>
  <button onclick="createBinder('one')">1칸</button>
  <button onclick="createBinder('three')">3칸</button>
  <button onclick="createBinder('four')">4칸</button>
</div>

<!-- 열리는 화면 -->
<div id="openScreen" class="screen">
  <div class="opening-container">
    <div class="book" id="book">
      <div class="cover" id="cover"></div>
      <div class="page" id="page"></div>
    </div>
  </div>
  <button onclick="goTo('binderScreen')">홈으로</button>
</div>

<script>
let binders = [];
let selectedColor = "#ffffff";

function goTo(screenId){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}

function goToLayout(){
  selectedColor = document.getElementById('colorPicker').value;
  goTo('layoutScreen');
}

function createBinder(layoutType){
  const binder = {
    id: Date.now(),
    color: selectedColor,
    layout: layoutType
  };
  binders.push(binder);
  renderBinders();
  goTo('binderScreen');
}

function renderBinders(){
  const list = document.getElementById('binderList');
  list.innerHTML = '';

  binders.forEach(b => {
    const div = document.createElement('div');
    div.className = 'binder';
    div.style.background = b.color;
    div.onclick = () => openBinder(b);
    list.appendChild(div);
  });
}

function openBinder(binder){
  const book = document.getElementById('book');
  const cover = document.getElementById('cover');
  const page = document.getElementById('page');

  cover.style.background = binder.color;

  page.className = 'page ' + binder.layout;
  page.innerHTML = '';

  let slots = 1;
  if(binder.layout === 'three') slots = 3;
  if(binder.layout === 'four') slots = 4;

  for(let i=0;i<slots;i++){
    const div = document.createElement('div');
    div.className = 'slot';
    page.appendChild(div);
  }

  goTo('openScreen');

  setTimeout(()=>{
    book.classList.add('open');
  },100);
}
</script>

</body>
</html>
