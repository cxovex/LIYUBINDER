<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHUEL LI YU</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#a9c3d6;
  color:white;
  text-align:center;
}

/* 공통 화면 */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{
  display:flex;
}

/* 버튼 */
button{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  margin:10px;
  font-size:16px;
  cursor:pointer;
}

.main-btn{
  background:white;
  color:#5d8aa8;
}

/* 바인더 카드 */
.binder{
  width:120px;
  height:160px;
  background:white;
  border-radius:15px;
  color:#5d8aa8;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:10px;
  font-weight:bold;
}

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

/* 속지 레이아웃 */
.page{
  width:250px;
  height:350px;
  background:white;
  border-radius:10px;
  margin-top:20px;
  display:grid;
  gap:5px;
  padding:10px;
}

.one{ grid-template-columns:1fr; }
.three{ grid-template-columns:1fr; grid-template-rows:repeat(3,1fr); }
.four{ grid-template-columns:repeat(2,1fr); grid-template-rows:repeat(2,1fr); }

.slot{
  background:#eaeaea;
  border-radius:5px;
}
</style>
</head>

<body>

<!-- 1️⃣ 메인 -->
<div id="main" class="screen active">
  <h1>CRUEL LI YU</h1>
  <p>PHOTO CARD BINDER</p>
  <button class="main-btn" onclick="goTo('binderScreen')">MY</button>
</div>

<!-- 2️⃣ 바인더 목록 -->
<div id="binderScreen" class="screen">
  <h2>MY BINDER</h2>
  <div class="grid" id="binderList"></div>
  <button onclick="goTo('createScreen')">＋</button>
</div>

<!-- 3️⃣ 바인더 생성 -->
<div id="createScreen" class="screen">
  <h2>바인더 만들기</h2>
  <button onclick="chooseLayout('one')">1칸</button>
  <button onclick="chooseLayout('three')">3칸</button>
  <button onclick="chooseLayout('four')">4칸</button>
  <button onclick="goTo('binderScreen')">← 뒤로</button>
</div>

<!-- 4️⃣ 속지 보기 -->
<div id="pageScreen" class="screen">
  <h2>속지</h2>
  <div id="pagePreview"></div>
  <button onclick="goTo('binderScreen')">홈으로</button>
</div>

<script>
function goTo(screenId){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}

function chooseLayout(type){
  const page = document.createElement('div');
  page.className = 'page '+type;

  let slots = 1;
  if(type==='three') slots=3;
  if(type==='four') slots=4;

  for(let i=0;i<slots;i++){
    const div=document.createElement('div');
    div.className='slot';
    page.appendChild(div);
  }

  const preview=document.getElementById('pagePreview');
  preview.innerHTML='';
  preview.appendChild(page);

  goTo('pageScreen');
}
</script>

</body>
</html>
