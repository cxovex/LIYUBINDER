<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHUEL LI YU</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#a9c3d6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

/* 화면 */
.screen{ display:none; flex-direction:column; align-items:center; }
.active{ display:flex; }

button{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

/* 홈 */
.home h1{ font-size:40px; }
.home button{ background:white; color:#5d8aa8; }

/* 책 */
.book{
  width:800px;
  height:450px;
  position:relative;
}

/* 표지 */
.cover{
  width:300px;
  height:450px;
  position:absolute;
  left:250px;
  transform-origin:left;
  transition:1s;
  z-index:5;
}
.cover.open{ transform:rotateY(-160deg); }

/* 페이지 */
.page{
  width:300px;
  height:450px;
  border:6px solid #555;
  background:white;
  display:grid;
  gap:10px;
  padding:10px;
  position:absolute;
  top:0;
}

.left{ left:200px; }
.right{ left:500px; }

/* 슬롯 */
.slot{ background:#ddd; }
</style>
</head>

<body>

<!-- 홈 -->
<div id="home" class="screen active home">
  <h1>CHUEL LI YU</h1>
  <button onclick="goTo('list')">MY</button>
</div>

<!-- 목록 -->
<div id="list" class="screen">
  <h2>MY BINDER</h2>
  <button onclick="goTo('color')">＋</button>
</div>

<!-- 색상 -->
<div id="color" class="screen">
  <h3>색상 선택</h3>
  <input type="color" id="colorPicker">
  <button onclick="goTo('sheet')">다음</button>
</div>

<!-- 속지 -->
<div id="sheet" class="screen">
  <h3>속지 선택</h3>
  <button onclick="start(1)">1칸</button>
  <button onclick="start(3)">3칸</button>
  <button onclick="start(4)">4칸</button>
</div>

<!-- 바인더 -->
<div id="binder" class="screen">
  <div class="book">

    <div class="cover" id="cover"></div>

    <div class="page left" id="left"></div>
    <div class="page right" id="right"></div>

  </div>
</div>

<script>
let color="#000";
let layout=4;
let currentPage=0;
const totalPages=20;

function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function start(type){
  layout=type;
  color=document.getElementById("colorPicker").value;
  currentPage=0;

  goTo('binder');

  document.getElementById("cover").style.background=color;

  setTimeout(()=>{
    document.getElementById("cover").classList.add("open");
  },100);

  render();
}

/* 슬롯 생성 */
function makeSlots(pageEl){
  pageEl.innerHTML="";

  if(layout===1){
    pageEl.style.gridTemplateColumns="1fr";
  }
  if(layout===3){
    pageEl.style.gridTemplateColumns="1fr 1fr 1fr";
  }
  if(layout===4){
    pageEl.style.gridTemplateColumns="1fr 1fr";
    pageEl.style.gridTemplateRows="1fr 1fr";
  }

  for(let i=0;i<layout;i++){
    const d=document.createElement("div");
    d.className="slot";
    pageEl.appendChild(d);
  }
}

/* 렌더 핵심 */
function render(){
  const left=document.getElementById("left");
  const right=document.getElementById("right");

  // 마지막 (뒷표지)
  if(currentPage === totalPages){
    makeSlots(left);
    right.innerHTML="";
    right.style.background="black";
    right.onclick=closeBinder;
    return;
  }

  right.style.background="white";

  // 첫 페이지
  if(currentPage === 0){
    left.style.background=color;
    left.innerHTML="";
    makeSlots(right);
  }
  else{
    makeSlots(left);
    makeSlots(right);
  }

  // 클릭 이벤트
  right.onclick = next;
  left.onclick = prev;
}

function next(){
  if(currentPage < totalPages){
    currentPage++;
    render();
  }
}

function prev(){
  if(currentPage > 0){
    currentPage--;
    render();
  }
}

function closeBinder(){
  document.getElementById("cover").classList.remove("open");

  setTimeout(()=>{
    goTo('home');
  },800);
}
</script>

</body>
</html>
