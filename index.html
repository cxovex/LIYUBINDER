<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHUEL LI YU</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#a9c3d6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

/* 화면 */
.screen{ display:none; flex-direction:column; align-items:center; }
.active{ display:flex; }

/* 버튼 */
button{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

/* 홈 */
.home h1{ font-size:40px; }
.home button{ background:white; color:#5d8aa8; }

/* 바인더 목록 */
.binder-list{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

/* + 버튼 */
.plus{
  font-size:40px;
  cursor:pointer;
}

/* 책 */
.book{
  width:800px;
  height:450px;
  position:relative;
  perspective:2000px;
}

/* 표지 */
.cover{
  width:300px;
  height:450px;
  position:absolute;
  left:250px;
  transform-origin:left;
  transition:1s;
  z-index:3;
}

.cover.open{ transform:rotateY(-160deg); }

/* 왼쪽 */
.left{
  width:300px;
  height:450px;
}

/* 오른쪽 */
.right{
  width:300px;
  height:450px;
  background:white;
  border:6px solid #555;
  display:grid;
  gap:10px;
  padding:10px;
  position:absolute;
  left:500px;
  top:0;
}

/* 포카칸 */
.slot{ background:#ddd; cursor:pointer; }
</style>
</head>

<body>

<!-- 홈 -->
<div id="home" class="screen active home">
  <h1>CHUEL LI YU</h1>
  <button onclick="goTo('list')">MY</button>
</div>

<!-- 바인더 목록 -->
<div id="list" class="screen">
  <h2>MY BINDER</h2>
  <div class="plus" onclick="goTo('color')">＋</div>
</div>

<!-- 색상 -->
<div id="color" class="screen">
  <h3>색상 선택</h3>
  <input type="color" id="colorPicker">
  <button onclick="goTo('sheet')">다음</button>
</div>

<!-- 속지 -->
<div id="sheet" class="screen">
  <h3>속지 선택</h3>
  <button onclick="start(1)">1칸</button>
  <button onclick="start(3)">3칸</button>
  <button onclick="start(4)">4칸</button>
</div>

<!-- 바인더 -->
<div id="binder" class="screen">
  <div class="book">

    <div class="cover" id="cover"></div>
    <div class="left" id="left"></div>
    <div class="right" id="right"></div>

  </div>
</div>

<script>
let color="#000000";
let layout=4;
let page=0;
const maxPage=20;

function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function start(type){
  layout=type;
  color=document.getElementById("colorPicker").value;
  page=0;

  goTo('binder');

  document.getElementById("cover").style.background=color;
  document.getElementById("left").style.background=color;

  setTimeout(()=>{
    document.getElementById("cover").classList.add("open");
  },100);

  render();
}

function render(){
  const right=document.getElementById("right");

  // 마지막
  if(page===maxPage){
    right.style.background="black";
    right.innerHTML="";
    right.onclick=closeBinder;
    return;
  }

  right.onclick=next;

  right.style.background="white";
  right.innerHTML="";

  // 레이아웃
  if(layout===1){
    right.style.gridTemplateColumns="1fr";
  }
  if(layout===3){
    right.style.gridTemplateColumns="1fr 1fr 1fr";
  }
  if(layout===4){
    right.style.gridTemplateColumns="1fr 1fr";
    right.style.gridTemplateRows="1fr 1fr";
  }

  for(let i=0;i<layout;i++){
    const d=document.createElement("div");
    d.className="slot";
    right.appendChild(d);
  }
}

function next(){
  if(page < maxPage){
    page++;
    render();
  }
}

function closeBinder(){
  document.getElementById("cover").classList.remove("open");

  setTimeout(()=>{
    goTo('home');
  },800);
}
</script>

</body>
</html>
