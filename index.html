<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHUEL LI YU</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#a9c3d6;
  text-align:center;
  color:white;
}

/* 화면 */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{
  display:flex;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  margin:10px;
  cursor:pointer;
}

/* 바인더 */
.binder{
  width:120px;
  height:160px;
  border-radius:15px;
  margin:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.4s;
}

.binder:hover{
  transform:scale(1.05);
}

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}
</style>
</head>

<body>

<!-- 메인 -->
<div id="main" class="screen active">
  <h1>CRUEL LI YU</h1>
  <button onclick="goTo('binderScreen')">MY</button>
</div>

<!-- 바인더 목록 -->
<div id="binderScreen" class="screen">
  <h2>MY BINDER</h2>
  <div class="grid" id="binderList"></div>
  <button onclick="goTo('createScreen')">＋</button>
</div>

<!-- 바인더 생성 -->
<div id="createScreen" class="screen">
  <h2>색상 선택</h2>
  <input type="color" id="colorPicker">
  <button onclick="createBinder()">생성하기</button>
  <button onclick="goTo('binderScreen')">← 뒤로</button>
</div>

<script>
let binders = [];

function goTo(screenId){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}

function createBinder(){
  const color = document.getElementById('colorPicker').value;
  const binder = {
    id: Date.now(),
    color: color
  };
  binders.push(binder);
  renderBinders();
  goTo('binderScreen');
}

function renderBinders(){
  const list = document.getElementById('binderList');
  list.innerHTML = '';
  binders.forEach(b => {
    const div = document.createElement('div');
    div.className = 'binder';
    div.style.background = b.color;
    div.onclick = () => openBinder(b.color);
    list.appendChild(div);
  });
}

function openBinder(color){
  alert("바인더 열림! (다음 단계에서 열리는 모션 구현할 거야)");
}
</script>

</body>
</html>
